<html>

<head>
    <link rel="stylesheet" href="jobApp.css">
    <title>Document</title>
</head>
<body>
    <form>
        <div class="forms">
            <img src="WhatsApp Image 2026-02-18 at 14.32.53.jpeg" alt="Comsats_Logo" style="width: 150px; height: 150px; margin-left: 10px;">
            <div class="CUI">
                <h2>Non Faculty Job Application Form</h2>
                <h1>Comsats University Islamabad </h1>
            </div>

            <div class="pic">
                <h3>Attach a <br> Photograph <br> 5cm to 5cm</h3>
                
            </div>
        </div>

        <div class="post">
            <div class="position">
                <label for="text"><b> <span>1.</span> Post applied for</b></label>
                <input type="text"  name="position" id="position" required/>
                <p>(mention only one position)</p>

                <label for="text"><b> <span>2.</span> Department</b></label>
                <input type="text"  name="position" id="position" required style="margin-left: 28px;"/>
                <p>(only if required)</p>

                <h3 style="margin-right: 40px;"> <b><span>3.</span>Campus</b>
                    <label style="margin-left:100px; font-size: 15px; margin-right: 10px;">
                        <input type="radio" name="campus" value="Sahiwal"/>
                        Sahiwal
                    </label>
                    <label style="font-size: 15px;">
                        <input type="radio" name="campus" value="Attock"/>
                        Attock
                    </label>
                    <p>(Please pick only one choice)</p>
                </h3>
            </div>
        </div>

        <div class="intro">
            <div class="name">
                <label for="text"><b> <span>4.</span> Name in full </b></label>
                <input type="text" name="fullName" id="name" required />
                <p><i>(Use Capital LETTERS)</i></p>

                <label for="text"> <b> <span>5.</span> Father Name </b> </label>
                <input type="text" name="fatherName"/>
                <p><i>(Use Capital LETTERS)</i></p>
            </div>
        </div>
    </form>
</body>
</html>
